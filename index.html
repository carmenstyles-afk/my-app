<!DOCTYPE html>
<html>
<head>
<title>AI Photo Insight</title>

<style>
body{
font-family: Arial;
max-width:600px;
margin:40px auto;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
}
</style>

</head>

<body>

<h2>AI Photo Insight</h2>
<label>Upload Photo</label>
<input type="file" id="photoInput" accept="image/*">

<label>Caption</label>
<input type="text">

<label>Emotion</label>
<select>
<option>Joy</option>
<option>Awe</option>
<option>Curiosity</option>
<option>Calm</option>
<option>Other</option>
</select>


<button onclick="analyze()">Analyze</button>

<h3 id="result"></h3>

<script>
async function analyze()
const caption = document.querySelector("input[type='text']").value
const emotion = document.querySelector("select").value
const file = document.getElementById("photoInput").files[0]

if (!file) {
  document.getElementById("result").innerText =
  "Please upload a photo first."
  return
}

document.getElementById("result").innerText =
"Analyzing your photo..."

const reader = new FileReader()

reader.onload = function() 

  document.getElementById("result").innerText =
  "Signal: Explorer | Emotion: " + emotion +
  " | Insight: Your image suggests curiosity and discovery."

}

reader.readAsDataURL(fi) {

  const caption = document.querySelector("input[type='text']").value
  const emotion = document.querySelector("select").value

  document.getElementById("result").innerText =
  "Signal: Explorer | Emotion: " + emotion + " | Insight: You capture discovery moments.";

}
</script>

</body>
</html>
